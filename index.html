<style>
/* ================================================================
   DESIGN SYSTEM — CoinQuest II (iOS-Optimized)
   ================================================================ */
:root {
  --void: #08060e;
  --abyss: #0e0b18;
  --obsidian: #141020;
  --slate: #1c1730;
  --dusk: #2a2345;
  --ash: #3d3560;

  --gold: #d4a843;
  --gold-bright: #f0c850;
  --gold-dim: #8a6d2b;
  --gold-glow: rgba(212,168,67,0.25);

  --mana: #3b82f6;
  --mana-glow: rgba(59,130,246,0.2);
  --hp: #ef4444;
  --hp-glow: rgba(239,68,68,0.2);
  --stamina: #22c55e;
  --stamina-glow: rgba(34,197,94,0.2);
  --arcane: #a855f7;
  --arcane-glow: rgba(168,85,247,0.2);
  --frost: #67e8f9;

  --glass: rgba(20,16,32,0.65);
  --glass-border: rgba(255,255,255,0.06);
  --text: #e8e4f0;
  --text-mid: #9890aa;
  --text-dim: #5a5270;

  --head: 'Cinzel', serif;
  --body: 'Outfit', sans-serif;

  /* iOS Safe Areas — critical for Dynamic Island + Home Indicator */
  --sat: env(safe-area-inset-top, 20px);
  --sab: env(safe-area-inset-bottom, 20px);
  --sal: env(safe-area-inset-left, 0px);
  --sar: env(safe-area-inset-right, 0px);

  /* Spring physics tokens */
  --spring-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
  --spring-smooth: cubic-bezier(0.22, 1, 0.36, 1);
  --spring-native: cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

/* ================================================================
   1. iOS RUBBER-BAND / OVERSCROLL FIX
   Prevents white/black gap during elastic overscroll
   ================================================================ */
html {
  height: 100%;
  overflow: hidden;
  background: var(--void);
}
body {
  height: 100%;
  overflow: hidden;
  background: var(--void);
  position: fixed;
  inset: 0;
  font-family: var(--body);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  -webkit-text-size-adjust: 100%;
}

/* Main scrollable area — only this element scrolls */
.app-scroll {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: none; /* Chrome/FF */
  background: var(--void);
}

/* ================================================================
   GLOBAL RESET — iOS NATIVE FEEL
   ================================================================ */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}
/* Allow text selection only in inputs */
input, textarea { -webkit-user-select: text; user-select: text; }
/* Remove iOS input styling */
input, select, textarea {
  -webkit-appearance: none;
  -moz-appearance: none;
  appearance: none;
  border-radius: 0; /* prevents iOS forced rounding */
}

/* ================================================================
   ATMOSPHERE
   ================================================================ */
.atmosphere {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 600px 400px at 20% 10%, rgba(168,85,247,0.06), transparent),
    radial-gradient(ellipse 500px 500px at 80% 90%, rgba(212,168,67,0.04), transparent),
    radial-gradient(ellipse 300px 300px at 50% 50%, rgba(59,130,246,0.03), transparent);
}
.dust {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.3;
  background-image:
    radial-gradient(1.2px 1.2px at 10% 20%, var(--gold) 0%, transparent 100%),
    radial-gradient(1px 1px at 30% 60%, var(--frost) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 50% 10%, var(--arcane) 0%, transparent 100%),
    radial-gradient(1px 1px at 70% 80%, var(--gold) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 40%, var(--mana) 0%, transparent 100%),
    radial-gradient(1px 1px at 55% 45%, var(--frost) 0%, transparent 100%);
  animation: dustDrift 25s linear infinite alternate;
  will-change: transform;
}
@keyframes dustDrift { from{transform:translateY(0)} to{transform:translateY(-12px)} }

/* ================================================================
   APP CONTAINER — respects Dynamic Island + Home Indicator
   ================================================================ */
.app {
  position: relative;
  z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  /* Dynamic Island: sat ensures content starts below it.
     Bottom: sab + nav height (72px) + breathing room */
  padding: calc(var(--sat) + 12px) calc(var(--sal) + 14px) calc(var(--sab) + 88px) calc(var(--sar) + 14px);
  min-height: 100%;
}

/* ================================================================
   GLASS PANEL
   ================================================================ */
.panel {
  background: var(--glass);
  /* iOS Safari: must use -webkit- prefix AND unprefixed */
  -webkit-backdrop-filter: blur(20px) saturate(1.3);
  backdrop-filter: blur(20px) saturate(1.3);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  position: relative;
  overflow: hidden;
}
.panel::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
}

/* ================================================================
   FRAME EVOLUTION (Level-based UI)
   ================================================================ */
.frame-lv1 .panel { border-color: rgba(255,255,255,0.05) }
.frame-lv5 .panel { border-color: rgba(212,168,67,0.12); box-shadow: 0 0 20px rgba(212,168,67,0.04) }
.frame-lv10 .panel { border-color: rgba(212,168,67,0.2); box-shadow: 0 0 30px rgba(212,168,67,0.06), inset 0 1px 0 rgba(212,168,67,0.08) }
.frame-lv15 .panel { border-color: rgba(168,85,247,0.2); box-shadow: 0 0 35px rgba(168,85,247,0.06), inset 0 1px 0 rgba(168,85,247,0.1) }
.frame-lv25 .panel { border-image: linear-gradient(135deg,rgba(212,168,67,0.4),rgba(168,85,247,0.3),rgba(59,130,246,0.3)) 1; box-shadow: 0 0 40px rgba(212,168,67,0.08), 0 0 80px rgba(168,85,247,0.04) }

/* ================================================================
   2. iOS HAPTIC COMPENSATION — Micro-animations
   Physical press feel via transform scale + spring easing
   ================================================================ */

/* Universal pressable — replaces missing navigator.vibrate on iOS */
.pressable {
  transition: transform 0.12s var(--spring-bounce), opacity 0.12s ease;
  will-change: transform;
}
.pressable:active {
  transform: scale(0.92);
  opacity: 0.85;
}

/* Lighter press for inline elements */
.pressable-soft:active {
  transform: scale(0.96);
  opacity: 0.9;
}

/* Heavy slam for primary actions */
.pressable-heavy:active {
  transform: scale(0.88);
  opacity: 0.8;
}

/* Chip / Rune selection bounce */
.chip, .rune {
  transition: transform 0.15s var(--spring-bounce),
              background 0.2s ease,
              border-color 0.2s ease,
              color 0.2s ease,
              box-shadow 0.2s ease;
  will-change: transform;
}
.chip:active, .rune:active {
  transform: scale(0.90);
}
/* Selected state with pop animation */
.chip.s { animation: chipSelect 0.35s var(--spring-bounce) }
@keyframes chipSelect {
  0% { transform: scale(0.88) }
  50% { transform: scale(1.06) }
  100% { transform: scale(1) }
}

/* Log entry press feedback with border flash */
.log-entry {
  transition: transform 0.15s var(--spring-bounce),
              background 0.2s ease,
              box-shadow 0.2s ease;
  will-change: transform;
}
.log-entry:active {
  transform: scale(0.975);
  background: rgba(255,255,255,0.03);
  box-shadow: inset 0 0 0 1px rgba(212,168,67,0.1);
}

/* Achievement badge press */
.ach-badge {
  transition: transform 0.2s var(--spring-bounce);
  will-change: transform;
}
.ach-badge:active { transform: scale(0.82) }
.ach-badge.u:active { box-shadow: 0 0 18px rgba(212,168,67,0.25) }

/* Orb stat cards */
.orb {
  transition: transform 0.15s var(--spring-bounce);
  will-change: transform;
}
.orb:active { transform: scale(0.94) }

/* ================================================================
   HEADER — below Dynamic Island
   ================================================================ */
.header {
  text-align: center;
  padding: 12px 0 10px;
  animation: riseIn 0.6s ease;
}
.logo {
  font-family: var(--head); font-size: 22px; font-weight: 900; letter-spacing: 3px;
  background: linear-gradient(135deg, var(--gold-bright), var(--gold), var(--gold-dim));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 12px var(--gold-glow));
}
.logo-sub {
  font-family: var(--body); font-size: 10px; font-weight: 300;
  color: var(--text-dim); letter-spacing: 4px; text-transform: uppercase; margin-top: 2px;
}

/* ================================================================
   CONNECTION BANNER
   ================================================================ */
.conn {
  padding: 8px 14px; border-radius: 10px; margin-bottom: 12px; font-size: 11px;
  display: flex; align-items: center; gap: 8px; font-weight: 500;
  cursor: pointer; animation: riseIn 0.5s ease 0.1s both;
}
.conn.ok { background: rgba(34,197,94,0.06); border: 1px solid rgba(34,197,94,0.12); color: var(--stamina) }
.conn.off { background: rgba(212,168,67,0.06); border: 1px solid rgba(212,168,67,0.12); color: var(--gold) }
.conn.err { background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.12); color: var(--hp) }
.conn-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; animation: pulse 2s ease infinite }
.conn.ok .conn-dot { background: var(--stamina); box-shadow: 0 0 8px var(--stamina-glow) }
.conn.off .conn-dot { background: var(--gold); box-shadow: 0 0 8px var(--gold-glow) }
.conn.err .conn-dot { background: var(--hp); box-shadow: 0 0 8px var(--hp-glow) }

/* ================================================================
   HERO CARD
   ================================================================ */
.hero { padding: 18px; margin-bottom: 14px; animation: riseIn 0.5s ease 0.15s both }
.hero-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px }
.hero-title-row { display: flex; align-items: center; gap: 10px }
.hero-emblem {
  width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center;
  justify-content: center; font-size: 22px;
  background: linear-gradient(135deg, rgba(212,168,67,0.12), rgba(168,85,247,0.08));
  border: 1px solid rgba(212,168,67,0.15);
}
.hero-name { font-family: var(--head); font-size: 13px; font-weight: 700; color: var(--gold-bright); letter-spacing: 1px }
.hero-class { font-size: 10px; color: var(--text-dim); font-weight: 400; margin-top: 1px }
.hero-level {
  font-family: var(--head); font-size: 11px; font-weight: 700; color: var(--gold);
  padding: 4px 12px; border-radius: 20px;
  background: linear-gradient(135deg, rgba(212,168,67,0.1), rgba(212,168,67,0.05));
  border: 1px solid rgba(212,168,67,0.15);
}

/* XP BAR — SVG shimmer */
.xp-container {
  position: relative; height: 18px; border-radius: 9px; overflow: hidden;
  background: rgba(34,197,94,0.06); border: 1px solid rgba(34,197,94,0.1);
}
.xp-fill {
  height: 100%; border-radius: 8px; position: relative;
  transition: width 1s var(--spring-smooth);
  background: linear-gradient(90deg, #15803d, var(--stamina));
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 0 15px var(--stamina-glow);
}
.xp-shimmer {
  position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
  animation: shimmer 3s ease infinite;
}
@keyframes shimmer { 0%{left:-60%} 100%{left:160%} }
.xp-label {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  font-size: 9px; font-weight: 700; color: #fff;
  text-shadow: 0 1px 2px rgba(0,0,0,0.5); letter-spacing: 0.5px;
}

/* ================================================================
   STAT ORBS
   ================================================================ */
.orbs { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 14px; animation: riseIn 0.5s ease 0.2s both }
.orb { padding: 16px 8px; text-align: center; position: relative }
.orb-icon { font-size: 20px; margin-bottom: 6px; filter: drop-shadow(0 0 6px var(--gold-glow)) }
.orb-val { font-family: var(--head); font-size: 14px; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 2px }
.orb-label { font-size: 9px; font-weight: 500; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px }
.orb.gold .orb-val { color: var(--gold-bright) }
.orb.stam .orb-val { color: var(--stamina) }
.orb.mana .orb-val { color: var(--mana) }
.orb::after { content: ''; position: absolute; bottom: 0; left: 20%; right: 20%; height: 1px;
  background: linear-gradient(90deg, transparent, var(--glass-border), transparent) }

/* ================================================================
   ACHIEVEMENTS
   ================================================================ */
.ach-row { display: flex; gap: 6px; margin-bottom: 14px; overflow-x: auto; scrollbar-width: none; padding: 2px 0; animation: riseIn 0.5s ease 0.25s both }
.ach-row::-webkit-scrollbar { display: none }
.ach-badge {
  flex-shrink: 0; width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center; font-size: 19px; border: 1.5px solid;
}
.ach-badge.u { background: rgba(212,168,67,0.08); border-color: rgba(212,168,67,0.2); box-shadow: 0 0 10px rgba(212,168,67,0.1) }
.ach-badge.l { background: rgba(255,255,255,0.01); border-color: rgba(255,255,255,0.04); filter: grayscale(1) brightness(0.3) }

/* ================================================================
   SKILL TREE (Category bars)
   ================================================================ */
.skills { padding: 16px; margin-bottom: 14px; animation: riseIn 0.5s ease 0.3s both }
.sec-title { font-family: var(--head); font-size: 10px; font-weight: 600; color: var(--text-mid); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px }
.skill-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px }
.skill-icon { font-size: 16px; width: 22px; text-align: center; flex-shrink: 0 }
.skill-track { flex: 1; height: 20px; background: rgba(255,255,255,0.03); border-radius: 6px; overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.03) }
.skill-bar { height: 100%; border-radius: 5px; position: relative; transition: width 0.8s var(--spring-smooth) }
.skill-bar::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 50%; background: linear-gradient(180deg,rgba(255,255,255,0.12),transparent); border-radius: 5px 5px 0 0 }
.skill-bar-label { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); font-size: 9px; font-weight: 600; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.5); z-index: 1; white-space: nowrap }
.skill-amt { font-family: var(--head); font-size: 9px; font-weight: 600; color: var(--text-dim); min-width: 56px; text-align: right }

/* ================================================================
   COMBAT LOG (Transactions)
   ================================================================ */
.combat-log { animation: riseIn 0.5s ease 0.35s both }
.log-entry {
  padding: 14px; margin-bottom: 6px; display: flex; align-items: center; gap: 12px;
  cursor: pointer; border-radius: 16px; position: relative;
}
.log-entry.sending { animation: sendPulse 1.5s ease infinite }
@keyframes sendPulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

.log-icon {
  width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center;
  justify-content: center; font-size: 18px; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.04);
}
.log-body { flex: 1; min-width: 0 }
.log-desc { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px }
.log-meta { display: flex; gap: 8px; align-items: center; font-size: 10px; color: var(--text-dim) }
.log-tag { display: inline-block; padding: 2px 7px; border-radius: 5px; font-size: 8px; font-weight: 600; letter-spacing: 0.3px }
.log-amounts { text-align: right; flex-shrink: 0 }
.log-orig { font-family: var(--head); font-size: 12px; font-weight: 700; margin-bottom: 2px }
.log-usd { font-size: 10px; color: var(--stamina); font-weight: 600 }
.log-del { background: none; border: none; color: var(--hp); font-size: 14px; cursor: pointer; padding: 6px 8px; border-radius: 8px; opacity: 0.4; transition: all 0.2s }
.log-del:active { opacity: 1; transform: scale(0.8) }

/* Loot-drop animation */
.log-entry.loot-drop { animation: lootDrop 0.5s var(--spring-smooth), lootGlow 1.2s ease 0.5s }
@keyframes lootDrop { from{opacity:0;transform:translateY(-20px) scale(0.9)} to{opacity:1;transform:translateY(0) scale(1)} }
@keyframes lootGlow { 0%{box-shadow:0 0 0 0 var(--gold-glow)} 50%{box-shadow:0 0 20px 4px var(--gold-glow)} 100%{box-shadow:0 0 0 0 transparent} }

/* ================================================================
   FILTER RUNES
   ================================================================ */
.runes { display: flex; gap: 6px; margin-bottom: 12px; overflow-x: auto; scrollbar-width: none; padding: 2px 0 }
.runes::-webkit-scrollbar { display: none }
.rune {
  flex-shrink: 0; padding: 6px 12px; border-radius: 10px; font-size: 11px; font-weight: 500;
  cursor: pointer; border: 1px solid transparent; background: rgba(255,255,255,0.02); color: var(--text-dim);
}
.rune.a {
  border-color: var(--arcane); background: rgba(168,85,247,0.08); color: var(--arcane);
  box-shadow: 0 0 10px rgba(168,85,247,0.08);
}

/* ================================================================
   EMPTY STATE
   ================================================================ */
.empty { text-align: center; padding: 50px 20px; animation: riseIn 0.5s ease }
.empty-glyph { font-size: 56px; margin-bottom: 14px; filter: drop-shadow(0 0 15px var(--gold-glow)) }
.empty-text { font-family: var(--head); font-size: 11px; color: var(--text-dim); line-height: 1.8; letter-spacing: 1px }

/* ================================================================
   3. BOTTOM NAV — iOS HOME INDICATOR SAFE
   Uses padding-bottom with sab to clear the swipe indicator
   ================================================================ */
.nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  background: linear-gradient(180deg, rgba(8,6,14,0.88), rgba(8,6,14,0.98));
  -webkit-backdrop-filter: blur(24px) saturate(1.5);
  backdrop-filter: blur(24px) saturate(1.5);
  border-top: 1px solid var(--glass-border);
  display: flex; justify-content: space-around; align-items: center;
  /* Critical: sab clears iOS home indicator */
  padding: 6px 16px calc(var(--sab) + 6px) 16px;
}
.nav-btn {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  border: none; background: none; color: var(--text-dim); cursor: pointer;
  padding: 6px 14px; border-radius: 10px;
  font-family: var(--body); font-size: 8px; font-weight: 600;
  letter-spacing: 0.5px; text-transform: uppercase;
  /* Pressable feel */
  transition: transform 0.12s var(--spring-bounce), color 0.2s ease;
  will-change: transform;
}
.nav-btn:active { transform: scale(0.85) }
.nav-btn.a { color: var(--gold) }
.nav-btn .ni { font-size: 22px; line-height: 1 }

/* QUICK CAST button */
.cast-btn {
  width: 56px; height: 56px; border-radius: 50%; border: 2px solid var(--gold);
  cursor: pointer; margin-top: -22px;
  background: linear-gradient(135deg, var(--gold), #c4942a); color: var(--void);
  font-size: 28px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 25px rgba(212,168,67,0.35), inset 0 1px 0 rgba(255,255,255,0.2);
  transition: transform 0.12s var(--spring-bounce), box-shadow 0.15s ease;
  will-change: transform;
  position: relative;
}
.cast-btn:active {
  transform: scale(0.82);
  box-shadow: 0 2px 12px rgba(212,168,67,0.25);
}
.cast-btn::after {
  content: ''; position: absolute; inset: -4px; border-radius: 50%;
  border: 1px solid rgba(212,168,67,0.2);
  animation: castRing 3s ease infinite;
}
@keyframes castRing { 0%,100%{transform:scale(1);opacity:0.5} 50%{transform:scale(1.08);opacity:0} }

/* ================================================================
   BOTTOM SHEET MODAL — iOS Spring Physics
   ================================================================ */
.overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.55);
  -webkit-backdrop-filter: blur(4px);
  backdrop-filter: blur(4px);
  display: flex; align-items: flex-end; justify-content: center;
  animation: fadeIn 0.2s ease;
}
.sheet {
  background: linear-gradient(180deg, var(--obsidian), var(--abyss));
  border-radius: 24px 24px 0 0;
  width: 100%; max-width: 480px;
  /* iOS keyboard: max-height adapts via JS visualViewport */
  max-height: 88dvh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
  /* Spring animation for opening — mimics iOS sheet */
  animation: sheetSpring 0.45s var(--spring-bounce);
  /* Critical: sab clears home indicator inside sheet */
  padding: 16px 18px calc(var(--sab) + 16px) 18px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
@keyframes sheetSpring {
  0% { transform: translateY(100%) }
  100% { transform: translateY(0) }
}
/* Sheet closing animation class (applied via JS) */
.sheet.closing {
  animation: sheetClose 0.3s var(--spring-native) forwards;
}
@keyframes sheetClose {
  to { transform: translateY(105%); opacity: 0.8 }
}

.sheet-handle {

/* ================================================================
   TOAST — positioned below Dynamic Island
   ================================================================ */
.toast {
  position: fixed;
  /* sat + extra padding to clear Dynamic Island fully */
  top: calc(var(--sat) + 16px);
  left: 50%; transform: translateX(-50%); z-index: 250;
  background: var(--obsidian); border: 1px solid rgba(212,168,67,0.2); border-radius: 14px;

}

/* XP POP — centered vertically, safe */
.xp-pop {

/* ================================================================
   CORE ANIMATIONS
   ================================================================ */
@keyframes riseIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
@keyframes toastIn { from{opacity:0;transform:translate(-50%,-12px)} to{opacity:1;transform:translate(-50%,0)} }
@keyframes toastOut { to{opacity:0;transform:translate(-50%,-12px)} }
@keyframes xpPop { 0%{opacity:0;transform:translate(-50%,-50%) scale(0.3)} 20%{opacity:1;transform:translate(-50%,-50%) scale(1.15)} 40%{transform:translate(-50%,-50%) scale(1)} 100%{opacity:0;transform:translate(-50%,-130%) scale(0.9)} }

/* Visual flash when expense is saved — replaces haptic */

}
@keyframes flashGold {

}

<script>
// ================================================================
// DATA
// ================================================================
const RATES={USD:1,EUR:1.085,GBP:1.295,UAH:0.024,RUB:0.011,PLN:0.255,CHF:1.135};
const SYM={USD:'$',EUR:'€',GBP:'£',UAH:'₴',RUB:'₽',PLN:'zł',CHF:'₣'};
const CATS=[
  {id:'food',label:'Еда',emoji:'🍖',color:'#FF7F50'},
  {id:'housing',label:'Жильё',emoji:'🏰',color:'#4ECDC4'},
  {id:'transport',label:'Транспорт',emoji:'🐎',color:'#45B7D1'},
  {id:'entertainment',label:'Развлечения',emoji:'🎭',color:'#F7DC6F'},
  {id:'shopping',label:'Покупки',emoji:'⚒️',color:'#BB8FCE'},
  {id:'health',label:'Здоровье',emoji:'❤️‍🩹',color:'#FF6B6B'},
  {id:'education',label:'Знания',emoji:'📜',color:'#82E0AA'},
  {id:'subscriptions',label:'Подписки',emoji:'🔮',color:'#AED6F1'},
  {id:'other',label:'Другое',emoji:'⚙️',color:'#888'},
];
const STS=[
  {id:'paid',label:'Оплачено',emoji:'⚔️',color:'#22c55e'},
  {id:'planned',label:'План',emoji:'🗺️',color:'#eab308'},
  {id:'recurring',label:'Регулярный',emoji:'♾️',color:'#3b82f6'},
];
const ACHS=[
  {id:'first',emoji:'⚔️',title:'Первый удар',desc:'1 расход',check:d=>d.length>=1},
  {id:'ten',emoji:'🛡️',title:'Десятка',desc:'10 записей',check:d=>d.length>=10},
  {id:'fifty',emoji:'👑',title:'Полтинник',desc:'50 записей',check:d=>d.length>=50},
  {id:'big',emoji:'💎',title:'Крупная добыча',desc:'>$500',check:d=>d.some(e=>toUSD(e.amount,e.currency)>500)},
  {id:'multi',emoji:'🌍',title:'Мультивалюта',desc:'3+ валюты',check:d=>new Set(d.map(e=>e.currency)).size>=3},
  {id:'saver',emoji:'🏆',title:'Экономный',desc:'5×<$5',check:d=>d.filter(e=>toUSD(e.amount,e.currency)<5).length>=5},
  {id:'streak',emoji:'🔥',title:'Серия',desc:'7 дней',check:d=>checkStreak(d,7)},
  {id:'allcats',emoji:'🎭',title:'Коллекционер',desc:'Все категории',check:d=>new Set(d.map(e=>e.category)).size>=CATS.length},
];

function checkStreak(d,n){if(!d.length)return false;const ds=[...new Set(d.map(e=>e.date))].sort().reverse();let s=1;for(let i=1;i<ds.length;i++){if((new Date(ds[i-1])-new Date(ds[i]))/864e5===1){s++;if(s>=n)return true}else s=1}return s>=n}
function toUSD(a,c){return(parseFloat(a)||0)*(RATES[c]||1)}
function fU(v){return'$'+v.toFixed(2)}
function td(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function fD(s){const p=s.split('-');return`${p[2]}.${p[1]}`}
function getFrame(l){if(l>=25)return'frame-lv25';if(l>=15)return'frame-lv15';if(l>=10)return'frame-lv10';if(l>=5)return'frame-lv5';return'frame-lv1'}

// ================================================================
// iOS HAPTIC COMPENSATION — Audio Cues Engine
// Unlocks AudioContext on first touch (iOS requirement)
// ================================================================
let audioCtx = null;
let audioUnlocked = false;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function unlockAudio() {
  if (audioUnlocked) return;
  initAudio();
  // iOS requires user-gesture triggered resume
  if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
  // Play silent buffer to fully unlock
  const buf = audioCtx.createBuffer(1, 1, 22050);
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  src.connect(audioCtx.destination);
  src.start(0);
  audioUnlocked = true;
}

// Synthesized audio cues — no external files needed
function playSound(type) {
  if (!audioCtx || !audioUnlocked) return;
  try {
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'coin') {
      // Coin clink — short high-freq ping
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1800, now);
      osc.frequency.exponentialRampToValueAtTime(2400, now + 0.05);
      osc.frequency.exponentialRampToValueAtTime(1200, now + 0.12);
      gain.gain.setValueAtTime(0.08, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      osc.start(now);
      osc.stop(now + 0.15);
    } else if (type === 'swoosh') {
      // Modal open swoosh — noise-like sweep
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, now);
      osc.frequency.exponentialRampToValueAtTime(80, now + 0.15);
      gain.gain.setValueAtTime(0.03, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
      osc.start(now);
      osc.stop(now + 0.18);
    } else if (type === 'tap') {
      // Soft tap — very short click
      osc.type = 'sine';
      osc.frequency.setValueAtTime(600, now);
      gain.gain.setValueAtTime(0.04, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
      osc.start(now);
      osc.stop(now + 0.04);
    } else if (type === 'levelup') {
      // Level up fanfare — ascending arpeggio
      [880, 1100, 1320, 1760].forEach((freq, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = 'sine';
        o.frequency.setValueAtTime(freq, now + i * 0.08);
        g.gain.setValueAtTime(0.06, now + i * 0.08);
        g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.08 + 0.2);
        o.start(now + i * 0.08);
        o.stop(now + i * 0.08 + 0.2);
      });
    }
  } catch(e) { /* Silent fail */ }
}

// Combined feedback: vibrate (Android) + audio (iOS) + visual
function feedback(type) {
  // Try vibration first (Android/Chrome)
  try {
    if (navigator.vibrate) {
      if (type === 'heavy') navigator.vibrate([30, 10, 30]);
      else if (type === 'medium') navigator.vibrate([15]);
      else navigator.vibrate([8]);
    }
  } catch(e) {}

  // Audio cue (iOS compensation)
  if (type === 'coin') playSound('coin');
  else if (type === 'swoosh') playSound('swoosh');
  else if (type === 'levelup') playSound('levelup');
  else playSound('tap');
}

// Unlock on first touch anywhere
document.addEventListener('touchstart', unlockAudio, { once: true, passive: true });
document.addEventListener('mousedown', unlockAudio, { once: true });

// ================================================================
// iOS KEYBOARD — Adjust sheet height when keyboard opens
// ================================================================
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    const sheet = document.querySelector('.sheet');
    if (sheet) {
      const vvh = window.visualViewport.height;
      sheet.style.maxHeight = (vvh - 20) + 'px';
    }
  });
}

// ================================================================
// STATE
// ================================================================
let S={expenses:[],screen:'home',modal:false,settings:false,filter:'all',
  form:{date:td(),desc:'',amount:'',currency:'EUR',category:'food',status:'paid'},
  editId:null,toasts:[],xpPops:[],apiUrl:null,apiStatus:'off',sending:false};

function load(){
  try{S.apiUrl=localStorage.getItem('cq_api')||null;
    const d=JSON.parse(localStorage.getItem('cq_data2')||'{}');
    if(d.expenses)S.expenses=d.expenses}catch(e){}
  if(!S.expenses.length)S.expenses=[
    {id:'d1',date:'2026-03-19',desc:'Аренда квартиры',amount:'850',currency:'EUR',category:'housing',status:'recurring'},
    {id:'d2',date:'2026-03-19',desc:'Продукты в Billa',amount:'47.50',currency:'EUR',category:'food',status:'paid'},
    {id:'d3',date:'2026-03-18',desc:'Spotify Premium',amount:'10.99',currency:'USD',category:'subscriptions',status:'recurring'},
    {id:'d4',date:'2026-03-17',desc:'Uber до аэропорта',amount:'35',currency:'EUR',category:'transport',status:'paid'},
    {id:'d5',date:'2026-03-16',desc:'Курс на Udemy',amount:'12.99',currency:'USD',category:'education',status:'paid'},

  if(S.apiUrl)testApi(true);

function save(){try{localStorage.setItem('cq_data2',JSON.stringify({expenses:S.expenses}))}catch(e){}}

// ================================================================
// SHEETS API
// ================================================================
async function testApi(silent){
  if(!S.apiUrl){S.apiStatus='off';if(!silent)R();return}
  try{const r=await fetch(S.apiUrl+'?action=ping');if(r.ok){const d=await r.json();S.apiStatus=d.status==='ok'?'ok':'err'}else S.apiStatus='err'}catch(e){S.apiStatus='err'}

async function sendToSheets(exp){

async function syncAll(){

// ================================================================
// GAME
// ================================================================
function getXP(){return S.expenses.length*15+S.expenses.reduce((s,e)=>s+Math.floor(toUSD(e.amount,e.currency)/10),0)}
function getLvl(){return Math.floor(getXP()/100)+1}
function getXPpct(){return getXP()%100}
function getTitle(l){if(l<3)return'Apprentice';if(l<6)return'Pathfinder';if(l<10)return'Knight';if(l<15)return'Archmage';if(l<25)return'Sovereign';return'Legend'}
function getEmblem(l){if(l<3)return'🗡️';if(l<6)return'🛡️';if(l<10)return'⚔️';if(l<15)return'🔮';if(l<25)return'👑';return'💀'}

// ================================================================
// RENDER
// ================================================================
function R(){
  const app=document.getElementById('app');
  const lvl=getLvl();
  app.className='app '+getFrame(lvl);
  let h='';
  if(S.screen==='home')h=rHome();
  else if(S.screen==='history')h=rHist();
  else if(S.screen==='stats')h=rStats();
  app.innerHTML=h+rNav();
  if(S.modal)app.innerHTML+=rModal();
  if(S.settings)app.innerHTML+=rSettings();

  S.toasts.forEach(t=>{const e=document.createElement('div');e.className='toast';e.textContent=t;document.body.appendChild(e);setTimeout(()=>e.remove(),2600)});S.toasts=[];
  S.xpPops.forEach(x=>{const e=document.createElement('div');e.className='xp-pop';e.textContent=`+${x} XP`;document.body.appendChild(e);setTimeout(()=>e.remove(),1200)});S.xpPops=[];

  bind();
}

function rConn(){
  if(S.apiStatus==='ok')return`<div class="conn ok pressable" onclick="openSettings()"><div class="conn-dot"></div>Sheets connected</div>`;
  if(S.apiStatus==='err')return`<div class="conn err pressable" onclick="openSettings()"><div class="conn-dot"></div>Connection failed — tap to fix</div>`;
  return`<div class="conn off pressable" onclick="openSettings()"><div class="conn-dot"></div>Connect Google Sheets</div>`;
}

function rHome(){
  const l=getLvl(),xp=getXPpct(),tot=S.expenses.reduce((s,e)=>s+toUSD(e.amount,e.currency),0);
  const mo=S.expenses.filter(e=>e.date.startsWith(td().slice(0,7)));
  const moU=mo.reduce((s,e)=>s+toUSD(e.amount,e.currency),0);
  const catT=CATS.map(c=>({...c,total:S.expenses.filter(e=>e.category===c.id).reduce((s,e)=>s+toUSD(e.amount,e.currency),0)})).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);
  const mx=catT[0]?.total||1;
  const recent=[...S.expenses].sort((a,b)=>b.date.localeCompare(a.date)||String(b.id).localeCompare(String(a.id))).slice(0,5);

  return`
  <div class="header"><div class="logo">COINQUEST</div><div class="logo-sub">Financial RPG</div></div>

  <div class="hero panel">

  </div>

  <div class="orbs">

    <div class="orb panel mana pressable"><div class="orb-icon">🎯</div><div class="orb-val">${S.expenses.length}</div><div class="orb-label">Entries</div></div>
  </div>

  <div class="ach-row">${ACHS.map(a=>`<div class="ach-badge ${a.check(S.expenses)?'u':'l'}" title="${a.title}">${a.emoji}</div>`).join('')}</div>

  ${catT.length?`<div class="skills panel"><div class="sec-title">Skill Tree</div>
    ${catT.map(c=>`<div class="skill-row"><div class="skill-icon">${c.emoji}</div>
      <div class="skill-track"><div class="skill-bar" style="width:${Math.max(c.total/mx*100,10)}%;background:linear-gradient(90deg,${c.color}BB,${c.color}66)">
        <span class="skill-bar-label">${c.label}</span></div></div>
      <div class="skill-amt">${fU(c.total)}</div></div>`).join('')}
  </div>`:''}

  <div class="combat-log"><div class="sec-title" style="margin:0 4px 10px">Combat Log</div>
    ${recent.length?recent.map(e=>rEntry(e)).join(''):`<div class="empty"><div class="empty-glyph">🏰</div><div class="empty-text">Begin Your Quest<br>Add Your First Expense</div></div>`}
  </div>`;

function bind(){
  document.querySelectorAll('.nav-btn[data-scr]').forEach(b=>{b.onclick=()=>{feedback('tap');S.screen=b.dataset.scr;R()}});
  document.querySelectorAll('.rune').forEach(t=>{t.onclick=()=>{feedback('tap');S.filter=t.dataset.f;R()}});
  if(S.modal){
    const d=document.getElementById('fd'),a=document.getElementById('fa'),dt=document.getElementById('fdt');
    if(d)d.oninput=()=>{S.form.desc=d.value};
    if(a)a.oninput=()=>{S.form.amount=a.value;const p=document.querySelector('.conv-val');if(p&&S.form.amount)p.textContent=`${SYM[S.form.currency]}${S.form.amount} → ${fU(toUSD(S.form.amount,S.form.currency))}`};
    if(dt)dt.oninput=()=>{S.form.date=dt.value};
    document.querySelectorAll('[data-cur]').forEach(e=>{e.onclick=()=>{feedback('tap');S.form.currency=e.dataset.cur;R()}});
    document.querySelectorAll('[data-cat]').forEach(e=>{e.onclick=()=>{feedback('tap');S.form.category=e.dataset.cat;R()}});
    document.querySelectorAll('[data-st]').forEach(e=>{e.onclick=()=>{feedback('tap');S.form.status=e.dataset.st;R()}});

    // Sheet drag-to-dismiss
    initSheetDrag();
  }
  document.querySelectorAll('.log-entry').forEach(el=>{
    if(!el.querySelector('button')){el.onclick=()=>{
      const id=el.dataset.id;const exp=S.expenses.find(e=>String(e.id)===String(id));
      if(exp){feedback('swoosh');S.form={...exp};S.editId=id;S.modal=true;R()}}}
  });
}

// ================================================================
// SHEET DRAG-TO-DISMISS (iOS native feel)
// ================================================================
function initSheetDrag() {
  const sheet = document.getElementById('modalSheet');
  if (!sheet) return;
  let startY = 0, currentY = 0, dragging = false;

  sheet.addEventListener('touchstart', (e) => {
    // Only drag from handle area (top 40px)
    const rect = sheet.getBoundingClientRect();
    const touchY = e.touches[0].clientY - rect.top;
    if (touchY > 50) return;
    startY = e.touches[0].clientY;
    dragging = true;
    sheet.style.transition = 'none';
  }, { passive: true });

  sheet.addEventListener('touchmove', (e) => {
    if (!dragging) return;
    currentY = e.touches[0].clientY - startY;
    if (currentY < 0) currentY = 0; // Can't drag up
    // Rubber-band resistance
    const dampened = currentY * 0.6;
    sheet.style.transform = `translateY(${dampened}px)`;
    // Fade overlay
    const overlay = sheet.parentElement;
    if (overlay) overlay.style.opacity = Math.max(0.3, 1 - dampened / 400);
  }, { passive: true });

  sheet.addEventListener('touchend', () => {
    if (!dragging) return;
    dragging = false;
    sheet.style.transition = 'transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s ease';
    const overlay = sheet.parentElement;
    if (currentY > 120) {
      // Dismiss
      sheet.style.transform = 'translateY(110%)';
      if (overlay) overlay.style.opacity = '0';
      setTimeout(closeM, 300);
    } else {
      // Snap back
      sheet.style.transform = 'translateY(0)';
      if (overlay) overlay.style.opacity = '1';
    }
    currentY = 0;
  }, { passive: true });
}

// ACTIONS
// ================================================================
window.openM = function(){
  feedback('swoosh');
  S.form={date:td(),desc:'',amount:'',currency:'EUR',category:'food',status:'paid'};
  S.editId=null; S.modal=true; R();
};

window.closeM = function(){
  S.modal=false; S.editId=null; R();
};

window.saveExp = async function(){
  if(!S.form.desc||!S.form.amount){S.toasts.push('⚠️ Fill description & amount');R();return}
  feedback('coin');

  const pL=getLvl(),pA=ACHS.filter(a=>a.check(S.expenses)).length;
  const id=S.editId||Date.now().toString();

  if(S.editId){
    S.expenses=S.expenses.map(e=>String(e.id)===String(S.editId)?{...S.form,id:S.editId}:e);
    S.toasts.push('✏️ Updated');
  }else{
    const ne={...S.form,id};
    S.expenses.push(ne);
    S.xpPops.push(15);
    if(S.apiUrl&&S.apiStatus==='ok'){
      S.sending=id;
      sendToSheets(ne).then(ok=>{S.sending=false;S.toasts.push(ok?'📊 Saved to Sheets':'⚠️ Sheet write failed');R()});
    }
  }

  save();
  const nL=getLvl(),nA=ACHS.filter(a=>a.check(S.expenses)).length;
  if(nL>pL){feedback('levelup');S.toasts.push(`🎉 LEVEL UP → ${getTitle(nL)}!`)}
  if(nA>pA){const la=ACHS.filter(a=>a.check(S.expenses)).pop();S.toasts.push(`🏆 ${la.emoji} ${la.title}!`)}
  S.modal=false;S.editId=null;R();

  // Visual flash on app container
  const app=document.getElementById('app');
  if(app){app.classList.add('save-flash');setTimeout(()=>app.classList.remove('save-flash'),500)}
};

window.delExp = function(id){feedback('tap');S.expenses=S.expenses.filter(e=>String(e.id)!==String(id));save();S.toasts.push('🗑️ Removed');R()};
window.openSettings = function(){feedback('swoosh');S.settings=true;R()};
window.closeSettings = function(){S.settings=false;R()};

window.testConn = async function(){
  const url=document.getElementById('api-url')?.value?.trim();
  const r=document.getElementById('test-result');
  if(!url){r.innerHTML='<div class="tres" style="background:rgba(239,68,68,.08);color:var(--hp)">Enter URL first</div>';return}
  r.innerHTML='<div class="tres" style="background:rgba(59,130,246,.08);color:var(--mana)">Testing...</div>';
  try{const res=await fetch(url+'?action=ping');const d=await res.json();
    r.innerHTML=d.status==='ok'?'<div class="tres" style="background:rgba(34,197,94,.08);color:var(--stamina)">✦ Connected successfully</div>':'<div class="tres" style="background:rgba(239,68,68,.08);color:var(--hp)">Invalid response</div>'}
  catch(e){r.innerHTML=`<div class="tres" style="background:rgba(239,68,68,.08);color:var(--hp)">${e.message}</div>`}
};

window.saveSettings = function(){
  const url=document.getElementById('api-url')?.value?.trim();
  S.apiUrl=url||null;localStorage.setItem('cq_api',S.apiUrl||'');S.settings=false;
  testApi(false).then(()=>{S.toasts.push(S.apiStatus==='ok'?'✦ Sheets connected':'⚠️ Connection failed');R()})};

window.doSync = async function(){
  if(!S.apiUrl||S.apiStatus!=='ok'){S.toasts.push('⚠️ Connect Sheets first');R();return}
  S.toasts.push('🔄 Syncing...');R();
  const ok=await syncAll();S.toasts.push(ok?'✦ All data synced':'❌ Sync failed');R()};

// ================================================================
// INIT
// ================================================================
load();
R();
</script>
