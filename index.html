<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CoinQuest">
<meta name="theme-color" content="#0a0a1a">
<title>CoinQuest — Expense Tracker</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@400;600;700&display=swap');

:root {
  --bg: #0a0a1a;
  --bg2: #111128;
  --bg3: #1a1a3e;
  --gold: #ffd700;
  --gold-dim: #b8960f;
  --xp: #39ff14;
  --hp: #ff3860;
  --mp: #00d4ff;
  --purple: #b24dff;
  --card: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.08);
  --text: #e8e8f0;
  --dim: #666680;
  --pixel: 'Press Start 2P', monospace;
  --mono: 'JetBrains Mono', monospace;
  --safe-t: env(safe-area-inset-top, 20px);
  --safe-b: env(safe-area-inset-bottom, 20px);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

body{font-family:var(--mono);background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}

body::before{content:'';position:fixed;inset:0;
  background:
    radial-gradient(1.2px 1.2px at 10% 20%,rgba(255,215,0,.35) 0%,transparent 100%),
    radial-gradient(1px 1px at 30% 60%,rgba(57,255,20,.25) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 50% 10%,rgba(0,212,255,.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 70% 80%,rgba(178,77,255,.25) 0%,transparent 100%),
    radial-gradient(1px 1px at 90% 40%,rgba(255,215,0,.25) 0%,transparent 100%),
    radial-gradient(1.3px 1.3px at 85% 15%,rgba(255,56,96,.2) 0%,transparent 100%);
  pointer-events:none;z-index:0}

.app{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:calc(var(--safe-t)+8px) 16px calc(var(--safe-b)+80px) 16px}

/* Connection banner */
.conn-banner{padding:10px 14px;border-radius:10px;margin-bottom:14px;font-size:11px;display:flex;align-items:center;gap:8px;animation:dropIn .3s ease}
.conn-banner.ok{background:rgba(57,255,20,.08);border:1px solid rgba(57,255,20,.2);color:var(--xp)}
.conn-banner.off{background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.2);color:var(--gold)}
.conn-banner.err{background:rgba(255,56,96,.08);border:1px solid rgba(255,56,96,.2);color:var(--hp)}
.conn-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.conn-banner.ok .conn-dot{background:var(--xp);box-shadow:0 0 6px var(--xp)}
.conn-banner.off .conn-dot{background:var(--gold);box-shadow:0 0 6px var(--gold)}
.conn-banner.err .conn-dot{background:var(--hp);box-shadow:0 0 6px var(--hp)}

/* Settings modal */
.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:150;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
.settings-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:24px 20px;width:90%;max-width:400px;animation:dropIn .3s ease}
.settings-title{font-family:var(--pixel);font-size:11px;color:var(--gold);text-align:center;margin-bottom:16px}
.settings-label{font-family:var(--pixel);font-size:7px;color:var(--dim);letter-spacing:1px;margin-bottom:6px;display:block}
.settings-input{width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--text);font-size:12px;font-family:var(--mono);outline:none;margin-bottom:14px;word-break:break-all}
.settings-input:focus{border-color:var(--mp);box-shadow:0 0 0 3px rgba(0,212,255,.1)}
.settings-hint{font-size:10px;color:var(--dim);margin-bottom:14px;line-height:1.5}
.settings-btns{display:flex;gap:8px}
.sbtn{flex:1;padding:12px;border:none;border-radius:10px;font-family:var(--pixel);font-size:9px;cursor:pointer;transition:all .15s}
.sbtn:active{transform:scale(.97)}
.sbtn-save{background:linear-gradient(135deg,var(--gold),#ffaa00);color:var(--bg)}
.sbtn-cancel{background:rgba(255,255,255,.06);color:var(--dim);border:1px solid var(--border)}
.sbtn-test{background:rgba(0,212,255,.12);color:var(--mp);border:1px solid rgba(0,212,255,.2)}
.test-result{margin-top:8px;padding:8px 12px;border-radius:8px;font-size:11px;animation:dropIn .2s}

/* Header */
.header{text-align:center;margin-bottom:18px;animation:dropIn .5s ease}
.logo{font-family:var(--pixel);font-size:18px;color:var(--gold);text-shadow:0 0 20px rgba(255,215,0,.4),2px 2px 0 #8b6914;letter-spacing:2px}
.logo-sub{font-size:9px;color:var(--dim);font-family:var(--pixel);letter-spacing:1px;margin-top:2px}

/* Player bar */
.pbar{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:14px;animation:dropIn .5s ease .1s both}
.prow{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.pname{font-family:var(--pixel);font-size:10px;color:var(--mp)}
.plvl{font-family:var(--pixel);font-size:9px;color:var(--gold);background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.2);padding:3px 8px;border-radius:6px}
.xpw{background:rgba(57,255,20,.08);border-radius:6px;height:14px;position:relative;overflow:hidden;border:1px solid rgba(57,255,20,.15)}
.xpf{height:100%;background:linear-gradient(90deg,#1a8a0a,var(--xp));border-radius:5px;transition:width .8s cubic-bezier(.22,1,.36,1);box-shadow:0 0 12px rgba(57,255,20,.4);position:relative}
.xpf::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.25),transparent);border-radius:5px 5px 0 0}
.xpt{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:8px;font-family:var(--pixel);color:#fff;text-shadow:1px 1px 0 rgba(0,0,0,.5)}

/* Stats grid */
.sgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;animation:dropIn .5s ease .2s both}
.scard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center;position:relative;overflow:hidden}
.scard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.scard.g::before{background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.scard.gr::before{background:linear-gradient(90deg,transparent,var(--xp),transparent)}
.scard.b::before{background:linear-gradient(90deg,transparent,var(--mp),transparent)}
.si{font-size:18px;margin-bottom:4px}
.sv{font-family:var(--pixel);font-size:11px;font-weight:700;margin-bottom:2px}
.scard.g .sv{color:var(--gold)} .scard.gr .sv{color:var(--xp)} .scard.b .sv{color:var(--mp)}
.sl{font-size:8px;color:var(--dim);font-family:var(--pixel)}

/* Achievements */
.achs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;animation:dropIn .5s ease .25s both}
.achs::-webkit-scrollbar{display:none}
.ach{flex-shrink:0;width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;border:2px solid;transition:transform .2s}
.ach:active{transform:scale(.9)}
.ach.u{background:rgba(255,215,0,.1);border-color:rgba(255,215,0,.3);box-shadow:0 0 12px rgba(255,215,0,.15)}
.ach.l{background:rgba(255,255,255,.02);border-color:rgba(255,255,255,.06);filter:grayscale(1) brightness(.4)}

/* Category bars */
.csec{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:14px;animation:dropIn .5s ease .3s both}
.stitle{font-family:var(--pixel);font-size:9px;color:var(--dim);letter-spacing:1px;margin-bottom:12px}
.crow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.cemoji{font-size:15px;width:22px;text-align:center}
.ctrack{flex:1;height:18px;background:rgba(255,255,255,.04);border-radius:4px;overflow:hidden}
.cbar{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.22,1,.36,1);display:flex;align-items:center;padding-left:6px;position:relative}
.cbar::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.2),transparent);border-radius:4px 4px 0 0}
.ctext{font-size:7px;font-family:var(--pixel);color:#fff;text-shadow:1px 1px 0 rgba(0,0,0,.5);white-space:nowrap;position:relative;z-index:1}
.camt{font-family:var(--pixel);font-size:8px;color:var(--dim);min-width:55px;text-align:right}

/* Expense items */
.elist{animation:dropIn .5s ease .35s both}
.eitem{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:all .2s;position:relative}
.eitem:active{transform:scale(.98);background:rgba(255,255,255,.06)}
.eitem.new{animation:slideRight .4s ease,glow 1s ease .4s}
.eicon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.einfo{flex:1;min-width:0}
.edesc{font-size:13px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.emeta{font-size:10px;color:var(--dim);display:flex;gap:8px;align-items:center}
.eamts{text-align:right;flex-shrink:0}
.eorig{font-family:var(--pixel);font-size:11px;font-weight:700;margin-bottom:2px}
.eusd{font-size:10px;color:var(--xp);font-family:var(--mono)}
.estatus{display:inline-block;padding:1px 5px;border-radius:4px;font-size:8px;font-family:var(--pixel)}

/* Sending indicator */
.sending{position:relative}
.sending::after{content:'📡';position:absolute;top:6px;right:6px;font-size:12px;animation:blink 1s infinite}

/* Filter tabs */
.ftabs{display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.ftabs::-webkit-scrollbar{display:none}
.ftab{flex-shrink:0;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--dim);font-size:11px;cursor:pointer;transition:all .15s;font-family:var(--mono)}
.ftab.a{border-color:var(--purple);background:rgba(178,77,255,.12);color:var(--purple)}

/* Empty */
.empty{text-align:center;padding:40px 20px;color:var(--dim)}
.empty-i{font-size:48px;margin-bottom:12px}
.empty-t{font-family:var(--pixel);font-size:10px;line-height:1.6}

/* Modal */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s}
.ms{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:88vh;overflow-y:auto;padding:20px 20px calc(var(--safe-b)+16px) 20px;animation:sheetUp .35s cubic-bezier(.22,1,.36,1)}
.mh{width:36px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:0 auto 16px}
.mt{font-family:var(--pixel);font-size:12px;color:var(--gold);text-align:center;margin-bottom:18px}
.fg{margin-bottom:12px}
.fl{font-family:var(--pixel);font-size:8px;color:var(--dim);letter-spacing:1px;margin-bottom:5px;display:block}
.fi{width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--text);font-size:15px;font-family:var(--mono);outline:none;transition:border-color .2s;-webkit-appearance:none}
.fi:focus{border-color:var(--mp);box-shadow:0 0 0 3px rgba(0,212,255,.1)}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--dim);font-size:12px;cursor:pointer;transition:all .15s;font-family:var(--mono);-webkit-user-select:none}
.chip:active{transform:scale(.95)}
.chip.s{border-color:var(--mp);background:rgba(0,212,255,.1);color:var(--text);box-shadow:0 0 8px rgba(0,212,255,.15)}
.fprev{background:rgba(57,255,20,.05);border:1px solid rgba(57,255,20,.15);border-radius:10px;padding:12px;text-align:center;margin-bottom:14px}
.fprev-l{font-family:var(--pixel);font-size:7px;color:var(--xp);opacity:.7;margin-bottom:4px}
.fprev-v{font-family:var(--pixel);font-size:16px;color:var(--xp);text-shadow:0 0 10px rgba(57,255,20,.4)}
.bsave{width:100%;padding:14px;border:none;border-radius:12px;font-family:var(--pixel);font-size:11px;cursor:pointer;transition:all .15s;color:var(--bg);background:linear-gradient(135deg,var(--gold),#ffaa00);box-shadow:0 4px 15px rgba(255,215,0,.3)}
.bsave:active{transform:scale(.97)}
.bsave:disabled{opacity:.5;transform:none}
.bcancel{width:100%;padding:12px;border:1px solid var(--border);border-radius:12px;background:transparent;color:var(--dim);font-family:var(--pixel);font-size:9px;cursor:pointer;margin-top:8px}

/* Bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;padding:8px 16px calc(var(--safe-b)+4px) 16px;z-index:50}
.nbtn{display:flex;flex-direction:column;align-items:center;gap:2px;border:none;background:none;color:var(--dim);cursor:pointer;padding:6px 12px;border-radius:8px;transition:all .15s;font-family:var(--pixel);font-size:7px}
.nbtn.a{color:var(--gold)}
.nbtn:active{transform:scale(.9)}
.nbtn .ni{font-size:20px}
.abtn{width:54px;height:54px;border-radius:50%;border:3px solid var(--gold);background:linear-gradient(135deg,#ffd700,#ff8c00);color:var(--bg);font-size:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-top:-20px;box-shadow:0 4px 20px rgba(255,215,0,.4);transition:all .15s}
.abtn:active{transform:scale(.9)}

/* Toast */
.toast{position:fixed;top:calc(var(--safe-t)+12px);left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--gold);border-radius:12px;padding:10px 18px;font-family:var(--pixel);font-size:9px;color:var(--gold);z-index:200;text-align:center;box-shadow:0 4px 20px rgba(255,215,0,.2);animation:toastIn .3s ease,toastOut .3s ease 2.2s forwards;white-space:nowrap}
.xp-pop{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);font-family:var(--pixel);font-size:24px;color:var(--xp);text-shadow:0 0 20px rgba(57,255,20,.6),2px 2px 0 rgba(0,0,0,.5);z-index:200;pointer-events:none;animation:xpPop 1s ease forwards}

@keyframes dropIn{from{opacity:0;transform:translateY(-15px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes slideRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes glow{0%{box-shadow:0 0 0 0 rgba(255,215,0,.4)}100%{box-shadow:0 0 0 0 transparent}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,-10px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes toastOut{to{opacity:0;transform:translate(-50%,-10px)}}
@keyframes xpPop{0%{opacity:1;transform:translate(-50%,-50%) scale(.5)}50%{transform:translate(-50%,-50%) scale(1.2)}100%{opacity:0;transform:translate(-50%,-120%) scale(1)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
</style>
</head>
<body>

<div class="app" id="app"></div>

<script>
// ===================== CONFIG =====================
const RATES={USD:1,EUR:1.085,GBP:1.295,UAH:0.024,RUB:0.011,PLN:0.255,CHF:1.135};
const SYM={USD:'$',EUR:'€',GBP:'£',UAH:'₴',RUB:'₽',PLN:'zł',CHF:'₣'};
const CATS=[
  {id:'food',label:'Еда',emoji:'🍔',color:'#FF7F50'},
  {id:'housing',label:'Жильё',emoji:'🏠',color:'#4ECDC4'},
  {id:'transport',label:'Транспорт',emoji:'🚗',color:'#45B7D1'},
  {id:'entertainment',label:'Развлечения',emoji:'🎉',color:'#F7DC6F'},
  {id:'shopping',label:'Покупки',emoji:'🛒',color:'#BB8FCE'},
  {id:'health',label:'Здоровье',emoji:'💊',color:'#FF6B6B'},
  {id:'education',label:'Образование',emoji:'📚',color:'#82E0AA'},
  {id:'subscriptions',label:'Подписки',emoji:'📱',color:'#AED6F1'},
  {id:'other',label:'Другое',emoji:'🔧',color:'#999'},
];
const STS=[
  {id:'paid',label:'Оплачено',emoji:'✅',color:'#00C853'},
  {id:'planned',label:'Запланировано',emoji:'⏳',color:'#FFD600'},
  {id:'recurring',label:'Регулярный',emoji:'🔄',color:'#2196F3'},
];
const ACHS=[
  {id:'first',emoji:'⚔️',title:'Первый удар',desc:'1 расход',check:d=>d.length>=1},
  {id:'ten',emoji:'🛡️',title:'Десятка',desc:'10 записей',check:d=>d.length>=10},
  {id:'fifty',emoji:'👑',title:'Полтинник',desc:'50 записей',check:d=>d.length>=50},
  {id:'big',emoji:'💎',title:'Крупная рыба',desc:'>$500',check:d=>d.some(e=>toUSD(e.amount,e.currency)>500)},
  {id:'multi',emoji:'🌍',title:'Мультивалюта',desc:'3+ валюты',check:d=>new Set(d.map(e=>e.currency)).size>=3},
  {id:'saver',emoji:'🏆',title:'Экономный',desc:'5×<$5',check:d=>d.filter(e=>toUSD(e.amount,e.currency)<5).length>=5},
  {id:'streak',emoji:'🔥',title:'Серия',desc:'7 дней',check:d=>checkStreak(d,7)},
  {id:'allcats',emoji:'🎭',title:'Коллекционер',desc:'Все категории',check:d=>new Set(d.map(e=>e.category)).size>=CATS.length},
];

function checkStreak(d,n){if(!d.length)return false;const ds=[...new Set(d.map(e=>e.date))].sort().reverse();let s=1;for(let i=1;i<ds.length;i++){if((new Date(ds[i-1])-new Date(ds[i]))/864e5===1){s++;if(s>=n)return true}else s=1}return s>=n}
function toUSD(a,c){return(parseFloat(a)||0)*(RATES[c]||1)}
function fUSD(v){return '$'+v.toFixed(2)}
function tday(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function fDate(s){const p=s.split('-');return `${p[2]}.${p[1]}`}

// ===================== STATE =====================
let S={
  expenses:[],
  screen:'home',
  modal:false,
  settings:false,
  filter:'all',
  form:{date:tday(),desc:'',amount:'',currency:'EUR',category:'food',status:'paid'},
  editId:null,
  toasts:[],
  xpPops:[],
  apiUrl:null,
  apiStatus:'off', // off, ok, err
  sending:false,
};

// ===================== STORAGE =====================
function load(){
  try{
    S.apiUrl=localStorage.getItem('cq_api')||null;
    const d=JSON.parse(localStorage.getItem('cq_data')||'{}');
    if(d.expenses)S.expenses=d.expenses;
  }catch(e){}
  if(!S.expenses.length){
    S.expenses=[
      {id:'demo1',date:'2026-03-19',desc:'Аренда квартиры',amount:'850',currency:'EUR',category:'housing',status:'recurring'},
      {id:'demo2',date:'2026-03-19',desc:'Продукты в Billa',amount:'47.50',currency:'EUR',category:'food',status:'paid'},
      {id:'demo3',date:'2026-03-18',desc:'Spotify Premium',amount:'10.99',currency:'USD',category:'subscriptions',status:'recurring'},
      {id:'demo4',date:'2026-03-17',desc:'Uber до аэропорта',amount:'35',currency:'EUR',category:'transport',status:'paid'},
      {id:'demo5',date:'2026-03-16',desc:'Курс на Udemy',amount:'12.99',currency:'USD',category:'education',status:'paid'},
    ];
  }
  if(S.apiUrl)testApi(true);
}
function save(){try{localStorage.setItem('cq_data',JSON.stringify({expenses:S.expenses}))}catch(e){}}

// ===================== GOOGLE SHEETS API =====================
async function testApi(silent){
  if(!S.apiUrl){S.apiStatus='off';if(!silent)render();return}
  try{
    const r=await fetch(S.apiUrl+'?action=ping');
    if(r.ok){const d=await r.json();S.apiStatus=d.status==='ok'?'ok':'err'}
    else S.apiStatus='err';
  }catch(e){S.apiStatus='err'}
  if(!silent)render();
}

async function sendToSheets(exp){
  if(!S.apiUrl||S.apiStatus!=='ok')return false;
  try{
    const r=await fetch(S.apiUrl,{
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'add',expense:exp}),
    });
    const d=await r.json();
    return d.status==='ok';
  }catch(e){console.error('Sheets error:',e);return false}
}

async function syncAllToSheets(){
  if(!S.apiUrl||S.apiStatus!=='ok')return false;
  try{
    const r=await fetch(S.apiUrl,{
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'batch',expenses:S.expenses}),
    });
    const d=await r.json();
    return d.status==='ok';
  }catch(e){return false}
}

// ===================== GAME =====================
function getXP(){return S.expenses.length*15+S.expenses.reduce((s,e)=>s+Math.floor(toUSD(e.amount,e.currency)/10),0)}
function getLvl(){return Math.floor(getXP()/100)+1}
function getXPinLvl(){return getXP()%100}
function getTitle(l){if(l<3)return'НОВИЧОК';if(l<6)return'СЛЕДОПЫТ';if(l<10)return'РЫЦАРЬ';if(l<15)return'МАГИСТР';if(l<25)return'АРХИМАГ';return'ЛЕГЕНДА'}

// ===================== RENDER =====================
function R(){
  const app=document.getElementById('app');
  let h='';
  if(S.screen==='home')h=rHome();
  else if(S.screen==='history')h=rHistory();
  else if(S.screen==='stats')h=rStats();
  app.innerHTML=h+rNav();
  if(S.modal)app.innerHTML+=rModal();
  if(S.settings)app.innerHTML+=rSettings();
  // Toasts
  S.toasts.forEach(t=>{const e=document.createElement('div');e.className='toast';e.textContent=t;document.body.appendChild(e);setTimeout(()=>e.remove(),2600)});
  S.toasts=[];
  S.xpPops.forEach(x=>{const e=document.createElement('div');e.className='xp-pop';e.textContent=`+${x} XP`;document.body.appendChild(e);setTimeout(()=>e.remove(),1100)});
  S.xpPops=[];
  bind();
}

function rConnBanner(){
  if(S.apiStatus==='ok')return `<div class="conn-banner ok"><div class="conn-dot"></div>Google Sheets подключён 📊</div>`;
  if(S.apiStatus==='err')return `<div class="conn-banner err" onclick="openSettings()"><div class="conn-dot"></div>Ошибка подключения — нажми для настройки</div>`;
  return `<div class="conn-banner off" onclick="openSettings()"><div class="conn-dot"></div>Подключи Google Sheets → нажми сюда</div>`;
}

function rHome(){
  const l=getLvl(),xp=getXPinLvl();
  const tot=S.expenses.reduce((s,e)=>s+toUSD(e.amount,e.currency),0);
  const mo=S.expenses.filter(e=>e.date.startsWith(tday().slice(0,7)));
  const moUSD=mo.reduce((s,e)=>s+toUSD(e.amount,e.currency),0);
  const catT=CATS.map(c=>({...c,total:S.expenses.filter(e=>e.category===c.id).reduce((s,e)=>s+toUSD(e.amount,e.currency),0)})).filter(c=>c.total>0).sort((a,b)=>b.total-a.total);
  const mx=catT[0]?.total||1;
  const recent=[...S.expenses].sort((a,b)=>b.date.localeCompare(a.date)||String(b.id).localeCompare(String(a.id))).slice(0,5);

  return `
  <div class="header"><div class="logo">⚔️ COINQUEST ⚔️</div><div class="logo-sub">EXPENSE TRACKER</div></div>
  ${rConnBanner()}
  <div class="pbar">
    <div class="prow"><div class="pname">${getTitle(l)}</div><div class="plvl">LVL ${l}</div></div>
    <div class="xpw"><div class="xpf" style="width:${xp}%"></div><div class="xpt">${xp}/100 XP</div></div>
  </div>
  <div class="sgrid">
    <div class="scard g"><div class="si">💰</div><div class="sv">${fUSD(tot)}</div><div class="sl">ВСЕГО</div></div>
    <div class="scard gr"><div class="si">📅</div><div class="sv">${fUSD(moUSD)}</div><div class="sl">МЕСЯЦ</div></div>
    <div class="scard b"><div class="si">🎯</div><div class="sv">${S.expenses.length}</div><div class="sl">ЗАПИСЕЙ</div></div>
  </div>
  <div class="achs">${ACHS.map(a=>`<div class="ach ${a.check(S.expenses)?'u':'l'}" title="${a.title}">${a.emoji}</div>`).join('')}</div>
  ${catT.length?`<div class="csec"><div class="stitle">📊 ПО КАТЕГОРИЯМ</div>${catT.map(c=>`<div class="crow"><div class="cemoji">${c.emoji}</div><div class="ctrack"><div class="cbar" style="width:${Math.max(c.total/mx*100,8)}%;background:linear-gradient(90deg,${c.color}CC,${c.color}88)"><span class="ctext">${c.label}</span></div></div><div class="camt">${fUSD(c.total)}</div></div>`).join('')}</div>`:''}
  <div class="elist"><div class="stitle" style="margin-bottom:10px">🗡️ ПОСЛЕДНИЕ РАСХОДЫ</div>
  ${recent.length?recent.map(e=>rItem(e)).join(''):`<div class="empty"><div class="empty-i">🏰</div><div class="empty-t">НАЧНИ КВЕСТ!<br>ДОБАВЬ ПЕРВЫЙ РАСХОД</div></div>`}
  </div>`;
}

function rHistory(){
  const f=S.filter==='all'?[...S.expenses]:S.expenses.filter(e=>e.category===S.filter);
  const sorted=f.sort((a,b)=>b.date.localeCompare(a.date)||String(b.id).localeCompare(String(a.id)));
  return `
  <div class="header"><div class="logo" style="font-size:14px">📜 ЖУРНАЛ</div></div>
  <div class="ftabs">
    <div class="ftab ${S.filter==='all'?'a':''}" data-f="all">Все</div>
    ${CATS.map(c=>S.expenses.some(e=>e.category===c.id)?`<div class="ftab ${S.filter===c.id?'a':''}" data-f="${c.id}">${c.emoji} ${c.label}</div>`:'').join('')}
  </div>
  <div class="elist">
    ${sorted.length?sorted.map(e=>rItem(e,true)).join(''):`<div class="empty"><div class="empty-i">📭</div><div class="empty-t">НЕТ ЗАПИСЕЙ</div></div>`}
  </div>
  <div style="text-align:center;margin-top:12px;font-family:var(--pixel);font-size:9px;color:var(--dim)">
    ИТОГО: <span style="color:var(--gold)">${fUSD((S.filter==='all'?S.expenses:S.expenses.filter(e=>e.category===S.filter)).reduce((s,e)=>s+toUSD(e.amount,e.currency),0))}</span>
  </div>`;
}

function rStats(){
  const tot=S.expenses.reduce((s,e)=>s+toUSD(e.amount,e.currency),0);
  const l=getLvl();
  const currencies={};
  S.expenses.forEach(e=>{if(!currencies[e.currency])currencies[e.currency]={total:0,count:0};currencies[e.currency].total+=parseFloat(e.amount)||0;currencies[e.currency].count++});
  return `
  <div class="header"><div class="logo" style="font-size:14px">📊 СТАТИСТИКА</div></div>
  <div class="csec"><div class="stitle">🏆 АЧИВКИ (${ACHS.filter(a=>a.check(S.expenses)).length}/${ACHS.length})</div>
  ${ACHS.map(a=>{const u=a.check(S.expenses);return`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;${u?'':'opacity:.35'}"><div style="font-size:22px">${a.emoji}</div><div><div style="font-family:var(--pixel);font-size:9px;color:${u?'var(--gold)':'var(--dim)'}">${a.title}</div><div style="font-size:11px;color:var(--dim)">${a.desc}</div></div>${u?'<div style="margin-left:auto;color:var(--xp);font-family:var(--pixel);font-size:8px">✓</div>':''}</div>`}).join('')}
  </div>
  <div class="csec"><div class="stitle">💱 ПО ВАЛЮТАМ</div>
  ${Object.entries(currencies).map(([c,d])=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)"><div style="font-size:13px">${SYM[c]} ${c}</div><div style="text-align:right"><div style="font-family:var(--pixel);font-size:10px">${SYM[c]}${d.total.toFixed(2)}</div><div style="font-size:10px;color:var(--xp)">${fUSD(d.total*RATES[c])}</div></div></div>`).join('')}
  <div style="display:flex;justify-content:space-between;padding:8px 0;font-family:var(--pixel);font-size:10px"><div style="color:var(--gold)">ИТОГО USD</div><div style="color:var(--gold)">${fUSD(tot)}</div></div>
  </div>
  <div class="csec"><div class="stitle">🎮 ПРОФИЛЬ</div>
    <div style="text-align:center;padding:12px 0">
      <div style="font-size:36px;margin-bottom:8px">⚔️</div>
      <div style="font-family:var(--pixel);font-size:12px;color:var(--mp);margin-bottom:4px">${getTitle(l)}</div>
      <div style="font-family:var(--pixel);font-size:18px;color:var(--gold);margin-bottom:8px">УРОВЕНЬ ${l}</div>
      <div style="font-size:11px;color:var(--dim)">XP: ${getXP()}</div>
    </div>
  </div>
  <button onclick="doSync()" style="width:100%;padding:14px;border:2px solid var(--mp);border-radius:12px;background:rgba(0,212,255,.08);color:var(--mp);font-family:var(--pixel);font-size:9px;cursor:pointer;margin-bottom:12px">🔄 SYNC ALL → GOOGLE SHEETS</button>
  `;
}

function rItem(e,del=false){
  const c=CATS.find(x=>x.id===e.category)||CATS[8];
  const st=STS.find(x=>x.id===e.status)||STS[0];
  const u=toUSD(e.amount,e.currency);
  return `<div class="eitem${S.sending===e.id?' sending':''}" data-id="${e.id}">
    <div class="eicon" style="background:${c.color}18;border:1px solid ${c.color}33">${c.emoji}</div>
    <div class="einfo"><div class="edesc">${e.desc}</div><div class="emeta"><span>${fDate(e.date)}</span><span class="estatus" style="background:${st.color}22;color:${st.color}">${st.emoji} ${st.label}</span></div></div>
    <div class="eamts"><div class="eorig">${SYM[e.currency]}${e.amount}</div><div class="eusd">${fUSD(u)}</div></div>
    ${del?`<button onclick="event.stopPropagation();delExp('${e.id}')" style="background:none;border:none;color:var(--hp);font-size:16px;cursor:pointer;padding:4px 8px;margin-left:4px">✕</button>`:''}
  </div>`;
}

function rModal(){
  const f=S.form,u=toUSD(f.amount,f.currency);
  return `<div class="mo" onclick="if(event.target===this)closeM()"><div class="ms">
    <div class="mh"></div><div class="mt">${S.editId?'✏️ РЕДАКТИРОВАТЬ':'⚔️ НОВЫЙ РАСХОД'}</div>
    <div class="fg"><div class="fl">ОПИСАНИЕ</div><input class="fi" id="fd" type="text" placeholder="За что платили..." value="${f.desc}"></div>
    <div class="fr"><div class="fg"><div class="fl">СУММА</div><input class="fi" id="fa" type="number" step="0.01" placeholder="0.00" value="${f.amount}" inputmode="decimal"></div>
    <div class="fg"><div class="fl">ДАТА</div><input class="fi" id="fdt" type="date" value="${f.date}"></div></div>
    <div class="fg"><div class="fl">ВАЛЮТА</div><div class="chips">${Object.keys(RATES).map(c=>`<div class="chip ${f.currency===c?'s':''}" data-cur="${c}">${SYM[c]} ${c}</div>`).join('')}</div></div>
    <div class="fg"><div class="fl">КАТЕГОРИЯ</div><div class="chips">${CATS.map(c=>`<div class="chip ${f.category===c.id?'s':''}" data-cat="${c.id}" style="${f.category===c.id?`border-color:${c.color};background:${c.color}18;color:${c.color}`:''}">${c.emoji} ${c.label}</div>`).join('')}</div></div>
    <div class="fg"><div class="fl">СТАТУС</div><div class="chips">${STS.map(s=>`<div class="chip ${f.status===s.id?'s':''}" data-st="${s.id}">${s.emoji} ${s.label}</div>`).join('')}</div></div>
    ${f.amount?`<div class="fprev"><div class="fprev-l">КОНВЕРТАЦИЯ В USD</div><div class="fprev-v">${SYM[f.currency]}${f.amount} → ${fUSD(u)}</div></div>`:''}
    <button class="bsave" onclick="saveExp()">${S.editId?'💾 СОХРАНИТЬ':'⚔️ ДОБАВИТЬ (+15 XP)'}</button>
    <button class="bcancel" onclick="closeM()">ОТМЕНА</button>
  </div></div>`;
}

function rSettings(){
  return `<div class="settings-overlay" onclick="if(event.target===this)closeSettings()">
    <div class="settings-card">
      <div class="settings-title">⚙️ GOOGLE SHEETS</div>
      <div class="settings-label">URL ВАШЕГО WEB APP</div>
      <input class="settings-input" id="api-url" type="url" placeholder="https://script.google.com/macros/s/..." value="${S.apiUrl||''}">
      <div class="settings-hint">
        1. Создай Google Sheet<br>
        2. Расширения → Apps Script<br>
        3. Вставь код из coinquest-google-apps-script.js<br>
        4. Выполни setupSheet()<br>
        5. Развернуть → Веб-приложение<br>
        6. Скопируй URL сюда ↑
      </div>
      <div class="settings-btns">
        <button class="sbtn sbtn-test" onclick="testConn()">🔌 ТЕСТ</button>
        <button class="sbtn sbtn-save" onclick="saveSettings()">💾 СОХРАНИТЬ</button>
        <button class="sbtn sbtn-cancel" onclick="closeSettings()">✕</button>
      </div>
      <div id="test-result"></div>
    </div>
  </div>`;
}

function rNav(){
  return `<div class="bnav">
    <button class="nbtn ${S.screen==='home'?'a':''}" data-scr="home"><span class="ni">🏠</span>ГЛАВНАЯ</button>
    <button class="nbtn ${S.screen==='history'?'a':''}" data-scr="history"><span class="ni">📜</span>ЖУРНАЛ</button>
    <button class="abtn" onclick="openM()">+</button>
    <button class="nbtn ${S.screen==='stats'?'a':''}" data-scr="stats"><span class="ni">📊</span>СТАТА</button>
    <button class="nbtn" onclick="openSettings()"><span class="ni">⚙️</span>НАСТРОЙКИ</button>
  </div>`;
}

// ===================== EVENTS =====================
function bind(){
  document.querySelectorAll('.nbtn[data-scr]').forEach(b=>{b.onclick=()=>{S.screen=b.dataset.scr;R()}});
  document.querySelectorAll('.ftab').forEach(t=>{t.onclick=()=>{S.filter=t.dataset.f;R()}});
  if(S.modal){
    const d=document.getElementById('fd'),a=document.getElementById('fa'),dt=document.getElementById('fdt');
    if(d)d.oninput=()=>{S.form.desc=d.value};
    if(a)a.oninput=()=>{S.form.amount=a.value;const p=document.querySelector('.fprev-v');if(p&&S.form.amount)p.textContent=`${SYM[S.form.currency]}${S.form.amount} → ${fUSD(toUSD(S.form.amount,S.form.currency))}`};
    if(dt)dt.oninput=()=>{S.form.date=dt.value};
    document.querySelectorAll('[data-cur]').forEach(e=>{e.onclick=()=>{S.form.currency=e.dataset.cur;R()}});
    document.querySelectorAll('[data-cat]').forEach(e=>{e.onclick=()=>{S.form.category=e.dataset.cat;R()}});
    document.querySelectorAll('[data-st]').forEach(e=>{e.onclick=()=>{S.form.status=e.dataset.st;R()}});
  }
  // Click to edit
  document.querySelectorAll('.eitem').forEach(el=>{
    if(!el.querySelector('button')){
      el.onclick=()=>{
        const id=el.dataset.id;
        const exp=S.expenses.find(e=>String(e.id)===String(id));
        if(exp){S.form={...exp};S.editId=id;S.modal=true;R()}
      }
    }
  });
}

// ===================== ACTIONS =====================
window.openM=function(){S.form={date:tday(),desc:'',amount:'',currency:'EUR',category:'food',status:'paid'};S.editId=null;S.modal=true;R()};
window.closeM=function(){S.modal=false;S.editId=null;R()};

window.saveExp=async function(){
  if(!S.form.desc||!S.form.amount){S.toasts.push('⚠️ Заполни описание и сумму!');R();return}
  const pL=getLvl(),pA=ACHS.filter(a=>a.check(S.expenses)).length;
  const id=S.editId||Date.now().toString();

  if(S.editId){
    S.expenses=S.expenses.map(e=>String(e.id)===String(S.editId)?{...S.form,id:S.editId}:e);
    S.toasts.push('✏️ Обновлено!');
  }else{
    const newExp={...S.form,id};
    S.expenses.push(newExp);
    S.xpPops.push(15);

    // Send to Google Sheets in background
    if(S.apiUrl&&S.apiStatus==='ok'){
      S.sending=id;
      sendToSheets(newExp).then(ok=>{
        S.sending=false;
        if(ok)S.toasts.push('📊 Записано в Google Sheets!');
        else S.toasts.push('⚠️ Sheets: ошибка записи');
        R();
      });
    }
  }

  save();
  const nL=getLvl(),nA=ACHS.filter(a=>a.check(S.expenses)).length;
  if(nL>pL)S.toasts.push(`🎉 LEVEL UP! → ${getTitle(nL)}`);
  if(nA>pA){const la=ACHS.filter(a=>a.check(S.expenses)).pop();S.toasts.push(`🏆 ${la.emoji} ${la.title}!`)}
  S.modal=false;S.editId=null;R();
};

window.delExp=function(id){
  S.expenses=S.expenses.filter(e=>String(e.id)!==String(id));
  save();S.toasts.push('🗑️ Удалено');R();
};

window.openSettings=function(){S.settings=true;R()};
window.closeSettings=function(){S.settings=false;R()};

window.testConn=async function(){
  const url=document.getElementById('api-url')?.value?.trim();
  const res=document.getElementById('test-result');
  if(!url){res.innerHTML='<div class="test-result" style="background:rgba(255,56,96,.1);color:var(--hp)">Введи URL!</div>';return}
  res.innerHTML='<div class="test-result" style="background:rgba(0,212,255,.1);color:var(--mp)">⏳ Проверяю...</div>';
  try{
    const r=await fetch(url+'?action=ping');
    const d=await r.json();
    if(d.status==='ok'){
      res.innerHTML='<div class="test-result" style="background:rgba(57,255,20,.1);color:var(--xp)">✅ Подключение успешно!</div>';
    }else{
      res.innerHTML='<div class="test-result" style="background:rgba(255,56,96,.1);color:var(--hp)">❌ Неверный ответ</div>';
    }
  }catch(e){
    res.innerHTML=`<div class="test-result" style="background:rgba(255,56,96,.1);color:var(--hp)">❌ ${e.message}</div>`;
  }
};

window.saveSettings=function(){
  const url=document.getElementById('api-url')?.value?.trim();
  S.apiUrl=url||null;
  localStorage.setItem('cq_api',S.apiUrl||'');
  S.settings=false;
  testApi(false).then(()=>{
    if(S.apiStatus==='ok')S.toasts.push('✅ Google Sheets подключён!');
    else if(S.apiUrl)S.toasts.push('⚠️ Не удалось подключиться');
    R();
  });
};

window.doSync=async function(){
  if(!S.apiUrl||S.apiStatus!=='ok'){S.toasts.push('⚠️ Сначала подключи Sheets в ⚙️');R();return}
  S.toasts.push('🔄 Синхронизация...');R();
  const ok=await syncAllToSheets();
  if(ok)S.toasts.push('✅ Все данные записаны в Sheets!');
  else S.toasts.push('❌ Ошибка синхронизации');
  R();
};

// ===================== INIT =====================
load();R();
</script>
