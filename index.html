<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Own Your Finance">
  <meta name="theme-color" content="#FAFAFA">
  <meta name="description" content="Track expenses, income & subscriptions">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Own Your Finance</title>
  <style>
    body { margin: 0; background: #FAFAFA; }
    #root { height: 100dvh; }
    .splash { display:flex;align-items:center;justify-content:center;height:100dvh;font-family:-apple-system,sans-serif;color:#888;font-size:14px; }
  </style>
</head>
<body>
  <div id="root"><div class="splash">Loading…</div></div>

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Recharts -->
  <script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.min.js"></script>

  <!-- Babel standalone for JSX transpilation -->
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- App code (JSX, transpiled by Babel in-browser) -->
  <script type="text/babel" data-type="module" src="app.jsx"></script>

  <!-- Bootstrap -->
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    // app.jsx defines window.OYFApp via the script load
    // We need a small delay for the module to load
    function tryRender() {
      if (window.OYFApp) {
        root.render(React.createElement(window.OYFApp));
      } else {
        setTimeout(tryRender, 100);
      }
    }
    tryRender();
  </script>

  <!-- Register service worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
